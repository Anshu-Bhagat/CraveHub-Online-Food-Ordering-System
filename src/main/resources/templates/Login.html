<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CraveHub</title>
    <link rel="icon" type="image/x-icon" href="./Images/logo.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="" th:href="@{/css/Navigation.css}" />
    <link rel="stylesheet" href="" th:href="@{/css/Login.css}" />
</head>

<body>
    <nav th:replace="~{Navigation::navbar()}"></nav>

    <div class="main-container">
        <div class="login-wrapper animate-up">
            
            <div class="login-section admin-section">
                <div class="header">
                    <i class="fa-solid fa-user-tie icon-large"></i>
                    <h2>Business <span style="color: #4caf50;">Admin</span></h2>
                    <p>Manage your restaurant & orders</p>
                </div>

                <form th:action="@{/adminLogin}" method="post">
                    <div class="input-box">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" name="email" placeholder="Admin Email" required>
                    </div>
                    
                    <div class="input-box">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" name="password" placeholder="Password" required>
                    </div>

                    <small class="error-msg" th:if="${error}" th:text="${error}"></small>
                    
                    <button type="submit" class="btn admin-btn">Access Dashboard <i class="fa-solid fa-arrow-right"></i></button>
                </form>
            </div>

            <div class="divider">
                <span>OR</span>
            </div>

            <div class="login-section user-section">
                <div class="header">
                    <i class="fa-solid fa-utensils icon-large"></i>
                    <h2>Foodie <span style="color: crimson;">User</span></h2>
                    <p>Order delicious food instantly</p>
                </div>

                <form th:action="@{/userLogin}" method="post">
                    <div class="input-box">
                        <i class="fa-solid fa-user"></i>
                        <input type="email" name="userEmail" placeholder="User Email" required>
                    </div>
                    
                    <div class="input-box">
                        <i class="fa-solid fa-key"></i>
                        <input type="password" name="userPassword" placeholder="Password" required maxlength="8" minlength="4">
                    </div>

                    <small class="error-msg" th:if="${error2}" th:text="${error2}"></small>
                    
                    <button type="submit" class="btn user-btn">Login to Eat <i class="fa-solid fa-burger"></i></button>
                </form>

                <div class="register-link">
                    <p>New here? <a th:href="@{/register}">Create an Account</a></p>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
