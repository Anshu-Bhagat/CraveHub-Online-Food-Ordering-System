<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Status | CraveHub</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #121212;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at center, #1f1f1f 0%, #121212 100%);
        }

        /* --- Main Card Container --- */
        .success-card {
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            max-width: 600px;
            width: 90%;
            position: relative;
            z-index: 10;
            animation: popUp 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        /* --- Progress Bar Styles --- */
        .track-container {
            margin: 40px 0;
            position: relative;
        }

        .progress-bar {
            display: flex;
            justify-content: space-between;
            position: relative;
            margin-bottom: 30px;
        }

        .progress-bar::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            width: 100%;
            height: 4px;
            background-color: #444;
            z-index: -1;
        }

        .progress-line {
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            width: 0%; /* JS will animate this */
            height: 4px;
            background-color: #4caf50;
            z-index: -1;
            transition: width 1s ease;
        }

        .step {
            text-align: center;
            background-color: #121212; /* Mask line behind icon */
            padding: 0 10px;
            position: relative;
        }

        .step-icon {
            width: 50px;
            height: 50px;
            background-color: #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-size: 20px;
            color: #888;
            border: 2px solid #555;
            transition: all 0.5s ease;
        }

        .step-text {
            font-size: 0.85rem;
            color: #888;
            font-weight: 500;
            transition: color 0.5s ease;
        }

        /* Active State Classes (Applied by JS) */
        .step.active .step-icon {
            background-color: #4caf50;
            border-color: #4caf50;
            color: white;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.6);
            transform: scale(1.1);
        }

        .step.active .step-text {
            color: #4caf50;
        }

        /* Blinking Animation for Current Step */
        .step.current .step-icon {
            animation: pulse-green 1.5s infinite;
        }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(76, 175, 80, 0); }
            100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); }
        }

        /* --- Other Styles --- */
        h1 { color: #4caf50; margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        .amount-box { margin-top: 20px; padding: 15px; background: rgba(255, 255, 255, 0.05); border-radius: 15px; border: 1px dashed #555; }
        .total-price { font-size: 2rem; font-weight: 700; color: white; }
        .btn-group { display: flex; gap: 15px; justify-content: center; margin-top: 30px; }
        .btn { text-decoration: none; padding: 10px 25px; border-radius: 30px; font-weight: 600; transition: all 0.3s ease; display: flex; align-items: center; gap: 8px; color: white; border: 1px solid white; }
        .btn:hover { background: white; color: black; }

        /* Confetti (Optional) */
        .confetti { position: absolute; width: 10px; height: 10px; background-color: #f2d74e; animation: fall linear infinite; }
        .c1 { left: 10%; animation-duration: 3s; background: #ff4b5c; }
        .c2 { left: 50%; animation-duration: 4s; background: #00ffcc; }
        .c3 { left: 90%; animation-duration: 2.8s; background: #9b59b6; }
        @keyframes fall { 0% { top: -10%; transform: rotate(0deg); opacity: 1; } 100% { top: 110%; transform: rotate(360deg); opacity: 0; } }
        @keyframes popUp { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }

    </style>
</head>

<body>

    <div class="confetti c1"></div>
    <div class="confetti c2"></div>
    <div class="confetti c3"></div>

    <div class="success-card">
        <h1>Order Placed!</h1>
        <p>Sit back & relax while we handle your hunger.</p>

        <div class="track-container">
            <div class="progress-bar">
                <div class="progress-line" id="progressLine"></div>
                
                <div class="step active current" id="step1">
                    <div class="step-icon"><i class="fa-solid fa-clipboard-check"></i></div>
                    <div class="step-text">Placed</div>
                </div>

                <div class="step" id="step2">
                    <div class="step-icon"><i class="fa-solid fa-fire-burner"></i></div>
                    <div class="step-text">Preparing</div>
                </div>

                <div class="step" id="step3">
                    <div class="step-icon"><i class="fa-solid fa-motorcycle"></i></div>
                    <div class="step-text">On Way</div>
                </div>

                <div class="step" id="step4">
                    <div class="step-icon"><i class="fa-solid fa-house-chimney"></i></div>
                    <div class="step-text">Delivered</div>
                </div>
            </div>
        </div>

        <div class="amount-box">
            <span style="color:#aaa;">Total Amount:</span>
            <span class="total-price" th:text="'₹ ' + ${amount}">₹ 0.0</span>
        </div>

        <div class="btn-group">
            <a href="/product/back" class="btn">
                <i class="fa-solid fa-arrow-left"></i> Menu
            </a>
        </div>
    </div>

    <script>
        // Simulate Order Stages
        window.onload = function() {
            const line = document.getElementById('progressLine');
            const step1 = document.getElementById('step1');
            const step2 = document.getElementById('step2');
            const step3 = document.getElementById('step3');
            const step4 = document.getElementById('step4');

            // Initial State (Order Placed)
            // Already active in HTML

            // Stage 2: Preparing (After 3 seconds)
            setTimeout(() => {
                line.style.width = "33%";
                step1.classList.remove('current'); // Stop blinking previous
                step2.classList.add('active');
                step2.classList.add('current'); // Start blinking current
            }, 3000);

            // Stage 3: On the Way (After 6 seconds)
            setTimeout(() => {
                line.style.width = "66%";
                step2.classList.remove('current');
                step3.classList.add('active');
                step3.classList.add('current');
            }, 6000);

            // Stage 4: Delivered (After 9 seconds)
            setTimeout(() => {
                line.style.width = "100%";
                step3.classList.remove('current');
                step4.classList.add('active');
                step4.classList.add('current');
                
                // Change Title
                document.querySelector('h1').innerText = "Enjoy Your Meal! 😋";
                document.querySelector('h1').style.color = "#ffcc00";
            }, 9000);
        };
    </script>

</body>
</html>
