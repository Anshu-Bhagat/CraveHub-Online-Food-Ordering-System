<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment | CraveHub</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="" th:href="@{/css/Payment.css}" />
</head>

<body>

    <div class="payment-wrapper animate-up">
        
        <div class="card-preview">
            <div class="card-face">
                <div class="chip">
                    <img src="https://raw.githubusercontent.com/dasShounak/free-use-images/main/chip.png" alt="chip">
                </div>
                <div class="logo">
                    <i class="fa-brands fa-cc-visa"></i>
                </div>
                <h3 class="card-number">#### #### #### ####</h3>
                <div class="card-details">
                    <div class="name">
                        <small>Card Holder</small>
                        <h5 class="card-name">FULL NAME</h5>
                    </div>
                    <div class="validity">
                        <small>Expires</small>
                        <h5>MM/YY</h5>
                    </div>
                </div>
            </div>
        </div>

        <div class="payment-form">
            <h2>Payment Details</h2>
            <p>Complete your purchase of <span style="color:crimson; font-weight:bold;" th:text="'₹ '+${amount}"></span></p>
            
            <form id="payForm" action="/processPayment" method="post">
                <div class="input-group">
                    <label>Card Number</label>
                    <input type="text" class="c-num" placeholder="1234 5678 1234 5678" maxlength="19" required oninput="updateCardNum(this)">
                    <i class="fa-regular fa-credit-card input-icon"></i>
                </div>

                <div class="input-group">
                    <label>Card Holder Name</label>
                    <input type="text" class="c-name" placeholder="e.g. Rahul Kumar" required oninput="updateCardName(this)">
                    <i class="fa-regular fa-user input-icon"></i>
                </div>

                <div class="row">
                    <div class="input-group">
                        <label>Expiry Date</label>
                        <input type="text" placeholder="MM/YY" maxlength="5" required>
                    </div>
                    <div class="input-group">
                        <label>CVV</label>
                        <input type="password" placeholder="123" maxlength="3" required>
                        <i class="fa-solid fa-lock input-icon"></i>
                    </div>
                </div>

                <button type="button" class="pay-btn" onclick="startProcessing()">
                    Pay Securely <span th:text="'₹ '+${amount}"></span>
                </button>
            </form>
        </div>
    </div>

    <div class="overlay" id="processingOverlay">
        <div class="loader-box">
            <div class="spinner"></div>
            <h3>Processing Payment...</h3>
            <p>Please do not close this window.</p>
        </div>
    </div>

    <script>
        // Update Card Visuals Real-time
        function updateCardNum(input) {
            document.querySelector('.card-number').innerText = input.value || "#### #### #### ####";
        }
        function updateCardName(input) {
            document.querySelector('.card-name').innerText = input.value.toUpperCase() || "FULL NAME";
        }

        // Fake Processing Logic
        function startProcessing() {
            // Check if form is valid (Simple check)
            const form = document.getElementById('payForm');
            if (form.checkValidity()) {
                // Show Overlay
                document.getElementById('processingOverlay').classList.add('active');
                
                // Wait for 3 seconds then submit
                setTimeout(() => {
                    form.submit();
                }, 3000);
            } else {
                form.reportValidity(); // Show validation errors
            }
        }
    </script>

</body>
</html>
